<!DOCTYPE html>
<html>
<body>

<h2>Create Order</h2>
<input id="cust" placeholder="Customer"><br>
<input id="prod" placeholder="Product"><br>
<input id="qty" placeholder="Qty"><br>
<button onclick="create()">Create</button>

<h2>Check Status</h2>
<input id="oid" placeholder="Order ID">
<button onclick="check()">Check</button>

<script>
const API = "https://5v26sh5iq8.execute-api.us-east-1.amazonaws.com"; // 🔴 Replace after terraform output

// ✅ CREATE ORDER
function create() {
  fetch(API + "/orders", {   // ✅ FIX: no trailing slash
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      customer_id: cust.value,
      product_id: prod.value,
      quantity: qty.value
    })
  })
  .then(res => res.json())
  .then(data => {
    alert(JSON.stringify(data, null, 2));  // ✅ Better output
  })
  .catch(err => {
    console.error(err);
    alert("Error creating order");
  });
}

// ✅ CHECK STATUS
function check() {

  // ✅ FIX: prevent empty request → avoids 500 error
  if (!oid.value) {
    alert("Please enter Order ID");
    return;
  }

  fetch(API + "/orders/" + oid.value)   // ✅ Correct endpoint
  .then(res => {
    if (!res.ok) {
      throw new Error("Order not found");
    }
    return res.json();
  })
  .then(data => {
    alert(JSON.stringify(data, null, 2));  // ✅ Proper display
  })
  .catch(err => {
    console.error(err);
    alert(err.message);
  });
}

</script>

</body>
</html>
